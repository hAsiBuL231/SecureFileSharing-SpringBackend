spring.application.name=SecureFileSharing

# H2 Database (file-based so data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/securefilesharing
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console (http://localhost:8080/h2-console to inspect DB)
spring.h2.console.enabled=true

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Local storage directory
file.upload-dir=./uploads

# Base URL used to build download links returned in responses
app.base-url=http://localhost:8080
